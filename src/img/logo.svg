<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="500" viewBox="0 0 1600 500"
     role="img" aria-labelledby="title desc">
  <title id="title">Логотип Кварта</title>
  <desc id="desc">Оранжевая монограмма KV и тёмная надпись КВАРТА на прозрачном фоне.</desc>

  <!-- Монограмма KV -->
  <g fill="#F0643D">
    <!-- Основная стойка K -->
    <path d="M85 105H140V395H85Z"/>
    <!-- Верхняя диагональ K -->
